<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iri's Bachelorette Jeopardy</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700;800&display=swap');

  :root {
    --sour-purple: #b4a0d6;
    --sour-dark: #7b68a4;
    --sour-deep: #5a4578;
    --sour-light: #e2d9f0;
    --sour-pink: #e8b4cb;
    --sour-lavender: #c8b6e2;
    --bg: #1a1025;
    --surface: #261835;
    --overlay: #33224a;
    --text: #f0e6ff;
    --text-muted: #a893c7;
    --gold: #ffd700;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg); color: var(--text);
    height: 100vh; overflow: hidden;
  }

  /* Sparkle background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 15% 85%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.4), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .app {
    position: relative; z-index: 1; padding: 8px 12px;
    max-width: 100%; margin: 0 auto;
    height: 100vh; display: flex; flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  .game-header {
    text-align: center;
    margin-bottom: 32px;
    padding: 24px;
  }
  .game-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--sour-purple), var(--sour-pink), var(--sour-lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    letter-spacing: -1px;
  }
  .game-header .subtitle {
    font-size: 16px;
    color: var(--sour-pink);
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ── Scoreboard ── */
  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 16px;
    padding: 6px 0 2px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .team-score {
    background: var(--surface);
    border: 2px solid var(--sour-dark);
    border-radius: 12px;
    padding: 10px 24px;
    text-align: center;
    min-width: 160px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .team-score::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--sour-purple), var(--sour-pink));
  }
  .team-score.active { border-color: var(--sour-pink); box-shadow: 0 0 20px rgba(232,180,203,0.2); }
  .team-name-input {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    width: 100%;
    outline: none;
    border-bottom: 1px dashed var(--sour-dark);
    padding-bottom: 4px;
    margin-bottom: 8px;
    font-family: inherit;
  }
  .team-name-input:focus { border-bottom-color: var(--sour-pink); }
  .score-value {
    font-size: 28px;
    font-weight: 800;
    color: var(--gold);
    font-family: 'Inter', sans-serif;
  }
  .score-controls {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 10px;
  }
  .score-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--sour-dark);
    background: var(--overlay);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .score-btn:hover { background: var(--sour-deep); border-color: var(--sour-purple); }
  .score-btn.add { color: #7ee8a0; }
  .score-btn.sub { color: #f87171; }

  /* ── Board ── */
  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 6px;
    flex: 1;
    min-height: 0;
  }

  .board-column {
    display: flex;
    flex-direction: column;
    gap: 6px;
    min-height: 0;
    overflow: hidden;
  }

  .category-header {
    background: linear-gradient(135deg, var(--sour-deep), var(--sour-dark));
    border-radius: 10px;
    padding: 6px 6px;
    text-align: center;
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--sour-light);
    height: 48px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(180,160,214,0.3);
    flex-shrink: 0;
    line-height: 1.2;
  }

  .cell {
    background: var(--surface);
    border: 1px solid rgba(180,160,214,0.2);
    border-radius: 10px;
    padding: 6px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-height: 0;
    font-size: 24px;
    font-weight: 800;
    color: var(--gold);
    font-family: 'Inter', sans-serif;
    position: relative;
  }
  .cell:hover {
    background: var(--overlay);
    border-color: var(--sour-purple);
    transform: scale(1.03);
    box-shadow: 0 4px 20px rgba(180,160,214,0.2);
  }
  .cell.used {
    background: rgba(26,16,37,0.6);
    color: rgba(255,215,0,0.15);
    cursor: pointer;
    border-color: rgba(180,160,214,0.08);
  }
  .cell.used:hover { transform: none; box-shadow: none; background: rgba(26,16,37,0.7); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,5,15,0.85);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 2px solid var(--sour-dark);
    border-radius: 20px;
    padding: 32px 48px;
    max-width: 900px;
    width: 92%;
    max-height: 92vh;
    overflow-y: auto;
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.3s;
    position: relative;
  }
  .modal-overlay.show .modal { transform: scale(1); }

  .modal-category {
    font-size: 16px;
    font-weight: 700;
    color: var(--sour-pink);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }
  .modal-amount {
    font-size: 44px;
    font-weight: 800;
    color: var(--gold);
    margin-bottom: 16px;
  }
  .modal-question {
    font-size: 24px;
    font-weight: 600;
    line-height: 1.4;
    margin-bottom: 20px;
    color: var(--text);
  }
  .modal-question img {
    max-height: 35vh;
  }
  .modal-answer {
    font-size: 18px;
    font-weight: 700;
    color: var(--sour-lavender);
    padding: 12px 20px;
    background: rgba(180,160,214,0.1);
    border-radius: 12px;
    border: 1px solid rgba(180,160,214,0.2);
    margin-bottom: 16px;
    display: none;
  }
  .modal-answer.show { display: block; }

  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .modal-btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-reveal {
    background: linear-gradient(135deg, var(--sour-purple), var(--sour-pink));
    color: #fff;
  }
  .btn-reveal:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(180,160,214,0.4); }
  .btn-close {
    background: var(--overlay);
    color: var(--text-muted);
    border: 1px solid var(--sour-dark);
  }
  .btn-close:hover { color: var(--text); border-color: var(--sour-purple); }

  .btn-award {
    background: var(--overlay);
    color: var(--gold);
    border: 1px solid rgba(255,215,0,0.3);
    font-size: 13px;
    padding: 8px 16px;
  }
  .btn-award:hover { background: rgba(255,215,0,0.1); }
  .btn-award.selected {
    background: rgba(255,215,0,0.2);
    border-color: var(--gold);
    box-shadow: 0 0 8px rgba(255,215,0,0.3);
  }

  /* ── Confetti ── */
  @keyframes fall {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  .confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    z-index: 200;
    animation: fall 3s ease-in forwards;
    pointer-events: none;
  }

  /* ── Floating heads ── */
  .floating-heads {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 80px;
    pointer-events: none;
    z-index: 0;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    padding: 0 20px 4px;
  }
  .floating-head {
    width: 55px;
    height: 55px;
    object-fit: contain;
    opacity: 0.7;
    animation: bobble1 3s ease-in-out infinite;
  }
  .heads-left, .heads-right {
    display: flex;
    gap: 20px;
    align-items: flex-end;
  }
  .floating-head:nth-child(1) { animation-delay: 0s; }
  .floating-head:nth-child(2) { animation-delay: 0.4s; }
  .floating-head:nth-child(3) { animation-delay: 0.8s; }

  @keyframes bobble1 {
    0%, 100% { transform: translateY(0) rotate(-15deg); }
    30% { transform: translateY(-65px) rotate(25deg); }
    70% { transform: translateY(-30px) rotate(-10deg); }
  }
  @keyframes bobble2 {
    0%, 100% { transform: translateY(-10px) rotate(12deg); }
    40% { transform: translateY(-75px) rotate(-28deg); }
    80% { transform: translateY(-35px) rotate(18deg); }
  }
  @keyframes bobble3 {
    0%, 100% { transform: translateY(-5px) rotate(-20deg); }
    25% { transform: translateY(-70px) rotate(30deg); }
    60% { transform: translateY(-25px) rotate(-12deg); }
  }

  .heads-left .floating-head:nth-child(1) { animation: bobble1 8s ease-in-out infinite; animation-delay: 0s; }
  .heads-left .floating-head:nth-child(2) { animation: bobble2 7.5s ease-in-out infinite; animation-delay: 0.3s; }
  .heads-left .floating-head:nth-child(3) { animation: bobble3 9s ease-in-out infinite; animation-delay: 0.7s; }
  .heads-right .floating-head:nth-child(1) { animation: bobble3 7.8s ease-in-out infinite; animation-delay: 0.5s; }
  .heads-right .floating-head:nth-child(2) { animation: bobble1 8.5s ease-in-out infinite; animation-delay: 0.2s; }
  .heads-right .floating-head:nth-child(3) { animation: bobble2 7.2s ease-in-out infinite; animation-delay: 0.8s; }
  @media (max-width: 768px) {
    .game-header h1 { font-size: 32px; }
    .board { gap: 4px; }
    .cell { font-size: 18px; padding: 4px; }
    .category-header { font-size: 10px; padding: 8px 4px; min-height: 48px; }
    .scoreboard { gap: 8px; }
    .team-score { min-width: 120px; padding: 8px 12px; }
    .modal { padding: 32px 24px; }
    .modal-question { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="floating-heads">
  <div class="heads-left">
    <img class="floating-head" src="head1.png" />
    <img class="floating-head" src="head2.png" />
    <img class="floating-head" src="head3.png" />
  </div>
  <div class="heads-right">
    <img class="floating-head" src="head3.png" />
    <img class="floating-head" src="head2.png" />
    <img class="floating-head" src="head1.png" />
  </div>
</div>

<div class="app">

  <div class="board" id="board"></div>
  <div class="scoreboard" id="scoreboard"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-category" id="modal-category"></div>
    <div class="modal-amount" id="modal-amount"></div>
    <div class="modal-question" id="modal-question"></div>
    <div class="modal-answer" id="modal-answer"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
const CATEGORIES = [
  'T-wizzle or T-swizzle',
  'GUESS THE SONG',
  'AI Boiz',
  'Jinjar (진짜)',
  'Young$ Kim'
];

const VALUES = [100, 200, 300, 400, 500];

// Per-category value lists (AI Boiz has 8 × $100)
const CATEGORY_VALUES = {};
CATEGORIES.forEach(cat => {
  if (cat === 'AI Boiz') {
    CATEGORY_VALUES[cat] = [100, 100, 100, 100, 100, 100, 100, 100];
  } else {
    CATEGORY_VALUES[cat] = VALUES;
  }
});

// Questions data: [category][key] = { q, a }
// For AI Boiz, keys are "AI Boiz-0" through "AI Boiz-7"
// For others, keys are "Category-100" through "Category-500"
const QUESTIONS = {};
CATEGORIES.forEach(cat => {
  QUESTIONS[cat] = {};
  const vals = CATEGORY_VALUES[cat];
  vals.forEach((val, idx) => {
    const qKey = (cat === 'AI Boiz') ? idx : val;
    QUESTIONS[cat][qKey] = {
      q: `$${val} question coming soon!`,
      a: 'Answer TBD'
    };
  });
});

// Override specific questions
QUESTIONS['GUESS THE SONG'][100] = { q: 'Name that song! 🎵', a: 'All I Want — Olivia Rodrigo' };

QUESTIONS['T-wizzle or T-swizzle'][100] = { q: 'This Taylor Swift album was re-recorded and re-released as "Taylor\'s Version" in 2021, featuring a 10-minute version of a beloved heartbreak anthem.', a: 'Red' };
QUESTIONS['T-wizzle or T-swizzle'][200] = { q: 'Taiwan\'s official name is the Republic of China. True or false: Taiwan is currently a member of the United Nations under that name.', a: 'False — Taiwan lost its UN seat to the People\'s Republic of China in 1971.' };
QUESTIONS['T-wizzle or T-swizzle'][300] = { q: 'Taiwan is the world\'s leading producer of this essential tech component, made by TSMC, that powers nearly every modern smartphone and computer.', a: 'Semiconductor chips (microchips / processors)' };
QUESTIONS['T-wizzle or T-swizzle'][400] = { q: 'Taylor Swift became the first artist to simultaneously hold the top 10 spots on the Billboard Hot 100. Which album caused this chart sweep?', a: 'Midnights (2022)' };
QUESTIONS['T-wizzle or T-swizzle'][500] = { q: 'Taylor Swift holds the record for the most Grammy Awards won by any artist in history. How many Grammys does she currently hold?', a: '14' };

// AI Boiz — image questions (who is this?)
const AI_BOIZ_IMAGES = ['aiboiz1.png','aiboiz2.png','aiboiz3.png','aiboiz4.png','aiboiz5.png','aiboiz6.png','aiboiz7.png','aiboiz8.png'];
const AI_BOIZ_ANSWERS = ['Itsumi','Nan','Evi','Andrea','Angie','Iri','Hanako','Allison'];
AI_BOIZ_IMAGES.forEach((img, i) => {
  QUESTIONS['AI Boiz'][i] = { q: 'who dis', a: AI_BOIZ_ANSWERS[i], image: img };
});

const teams = [
  { name: 'Team 1', score: 0 },
  { name: 'Team 2', score: 0 },
  { name: 'Team 3', score: 0 },
];

const usedCells = new Set();
let currentQ = null;

function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = teams.map((t, i) => `
    <div class="team-score" id="team-${i}">
      <input class="team-name-input" value="${t.name}" onchange="teams[${i}].name = this.value" />
      <div class="score-value" id="score-${i}">$${t.score}</div>
      <div class="score-controls">
        <button class="score-btn sub" onclick="adjustScore(${i}, -100)">−</button>
        <button class="score-btn add" onclick="adjustScore(${i}, 100)">+</button>
      </div>
    </div>
  `).join('');
}

function adjustScore(teamIdx, amount) {
  teams[teamIdx].score += amount;
  document.getElementById(`score-${teamIdx}`).textContent = `$${teams[teamIdx].score}`;
  if (amount > 0) pulseTeam(teamIdx);
}

function pulseTeam(idx) {
  const el = document.getElementById(`team-${idx}`);
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 600);
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  CATEGORIES.forEach(cat => {
    const col = document.createElement('div');
    col.className = 'board-column';

    const h = document.createElement('div');
    h.className = 'category-header';
    h.textContent = cat;
    col.appendChild(h);

    const vals = CATEGORY_VALUES[cat];
    vals.forEach((val, idx) => {
      const qKey = (cat === 'AI Boiz') ? idx : val;
      const cellKey = `${cat}-${qKey}`;
      const cell = document.createElement('div');
      cell.className = 'cell' + (usedCells.has(cellKey) ? ' used' : '');
      cell.textContent = `$${val}`;
      cell.onclick = () => {
        if (usedCells.has(cellKey)) {
          // Review mode — show question and answer, no scoring
          openQuestion(cat, qKey, val, cellKey, true);
        } else {
          openQuestion(cat, qKey, val, cellKey, false);
        }
      };
      col.appendChild(cell);
    });

    board.appendChild(col);
  });
}

function openQuestion(cat, qKey, val, cellKey, reviewMode) {
  currentQ = reviewMode ? null : { cat, val, key: cellKey };
  const q = QUESTIONS[cat][qKey];
  document.getElementById('modal-category').textContent = cat;
  document.getElementById('modal-amount').textContent = `$${val}`;

  const questionEl = document.getElementById('modal-question');
  if (q.image) {
    questionEl.innerHTML = `
      <div style="margin-bottom:16px">${q.q}</div>
      <img src="${q.image}" style="max-height:45vh; max-width:100%; border-radius:12px; object-fit:contain;" />
    `;
  } else if (q.audio) {
    questionEl.innerHTML = `
      ${q.q}<br><br>
      <button class="modal-btn btn-reveal" onclick="this.nextElementSibling.play(); this.textContent='🔊 Playing...'" style="font-size:20px;">
        🎵 Play Snippet
      </button>
      <audio src="${q.audio}" preload="auto"></audio>
    `;
  } else {
    questionEl.textContent = q.q;
  }

  const ansEl = document.getElementById('modal-answer');
  ansEl.textContent = q.a;

  if (reviewMode) {
    ansEl.classList.add('show');
    document.getElementById('modal-actions').innerHTML = `
      <button class="modal-btn btn-close" onclick="closeModal()">Close</button>
    `;
  } else {
    ansEl.classList.remove('show');
    document.getElementById('modal-actions').innerHTML = `
      <button class="modal-btn btn-reveal" onclick="revealAnswer()">Reveal Answer</button>
      <button class="modal-btn btn-close" onclick="closeModal()">Close</button>
    `;
  }

  document.getElementById('modal').classList.add('show');
}

function revealAnswer() {
  document.getElementById('modal-answer').classList.add('show');
  const actions = document.getElementById('modal-actions');
  actions.innerHTML = `
    ${teams.map((t, i) => `<button class="modal-btn btn-award" data-team="${i}" onclick="toggleTeam(this)">${t.name}</button>`).join('')}
    <button class="modal-btn btn-reveal" onclick="awardSelected()">Award Points</button>
    <button class="modal-btn btn-close" onclick="closeModal()">No one got it</button>
  `;
}

function toggleTeam(btn) {
  btn.classList.toggle('selected');
}

function awardSelected() {
  const selected = document.querySelectorAll('.btn-award.selected');
  if (selected.length === 0) { closeModal(); return; }
  selected.forEach(btn => {
    const idx = parseInt(btn.dataset.team);
    teams[idx].score += currentQ.val;
    document.getElementById(`score-${idx}`).textContent = `$${teams[idx].score}`;
    pulseTeam(idx);
  });
  launchConfetti();
  closeModal();
}

function closeModal() {
  if (currentQ) {
    usedCells.add(currentQ.key);
    renderBoard();
    currentQ = null;
  }
  document.getElementById('modal').classList.remove('show');
}

function launchConfetti() {
  const colors = ['#b4a0d6', '#e8b4cb', '#ffd700', '#c8b6e2', '#7ee8a0', '#f87171'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 0.5 + 's';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.width = (5 + Math.random() * 8) + 'px';
    c.style.height = (5 + Math.random() * 8) + 'px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// Keyboard: Escape closes modal
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

renderScoreboard();
renderBoard();
</script>
</body>
</html>
