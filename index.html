<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>💜 Iri's Bachelorette Jeopardy 💜</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Inter:wght@400;600;700;800&display=swap');

  :root {
    --sour-purple: #b4a0d6;
    --sour-dark: #7b68a4;
    --sour-deep: #5a4578;
    --sour-light: #e2d9f0;
    --sour-pink: #e8b4cb;
    --sour-lavender: #c8b6e2;
    --bg: #1a1025;
    --surface: #261835;
    --overlay: #33224a;
    --text: #f0e6ff;
    --text-muted: #a893c7;
    --gold: #ffd700;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Sparkle background */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(1px 1px at 10% 20%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1px 1px at 30% 60%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1.5px 1.5px at 50% 10%, rgba(255,255,255,0.5), transparent),
      radial-gradient(1px 1px at 70% 40%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.4), transparent),
      radial-gradient(1.5px 1.5px at 15% 85%, rgba(255,255,255,0.3), transparent),
      radial-gradient(1px 1px at 55% 55%, rgba(255,255,255,0.2), transparent),
      radial-gradient(1px 1px at 85% 15%, rgba(255,255,255,0.4), transparent);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; padding: 24px; max-width: 1200px; margin: 0 auto; }

  /* ── Header ── */
  .game-header {
    text-align: center;
    margin-bottom: 32px;
    padding: 24px;
  }
  .game-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 48px;
    font-weight: 900;
    background: linear-gradient(135deg, var(--sour-purple), var(--sour-pink), var(--sour-lavender));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 4px;
    letter-spacing: -1px;
  }
  .game-header .subtitle {
    font-size: 16px;
    color: var(--sour-pink);
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
  }

  /* ── Scoreboard ── */
  .scoreboard {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .team-score {
    background: var(--surface);
    border: 2px solid var(--sour-dark);
    border-radius: 16px;
    padding: 16px 28px;
    text-align: center;
    min-width: 180px;
    transition: all 0.2s;
    position: relative;
    overflow: hidden;
  }
  .team-score::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--sour-purple), var(--sour-pink));
  }
  .team-score.active { border-color: var(--sour-pink); box-shadow: 0 0 20px rgba(232,180,203,0.2); }
  .team-name-input {
    background: transparent;
    border: none;
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    text-align: center;
    width: 100%;
    outline: none;
    border-bottom: 1px dashed var(--sour-dark);
    padding-bottom: 4px;
    margin-bottom: 8px;
    font-family: inherit;
  }
  .team-name-input:focus { border-bottom-color: var(--sour-pink); }
  .score-value {
    font-size: 36px;
    font-weight: 800;
    color: var(--gold);
    font-family: 'Inter', sans-serif;
  }
  .score-controls {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 10px;
  }
  .score-btn {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    border: 1px solid var(--sour-dark);
    background: var(--overlay);
    color: var(--text);
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .score-btn:hover { background: var(--sour-deep); border-color: var(--sour-purple); }
  .score-btn.add { color: #7ee8a0; }
  .score-btn.sub { color: #f87171; }

  /* ── Board ── */
  .board {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    margin-bottom: 32px;
  }

  .category-header {
    background: linear-gradient(135deg, var(--sour-deep), var(--sour-dark));
    border-radius: 12px;
    padding: 16px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--sour-light);
    min-height: 72px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(180,160,214,0.3);
  }

  .cell {
    background: var(--surface);
    border: 1px solid rgba(180,160,214,0.2);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 80px;
    font-size: 28px;
    font-weight: 800;
    color: var(--gold);
    font-family: 'Inter', sans-serif;
    position: relative;
  }
  .cell:hover {
    background: var(--overlay);
    border-color: var(--sour-purple);
    transform: scale(1.03);
    box-shadow: 0 4px 20px rgba(180,160,214,0.2);
  }
  .cell.used {
    background: rgba(26,16,37,0.6);
    color: rgba(255,215,0,0.15);
    cursor: default;
    border-color: rgba(180,160,214,0.08);
  }
  .cell.used:hover { transform: none; box-shadow: none; background: rgba(26,16,37,0.6); }

  /* ── Modal ── */
  .modal-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10,5,15,0.85);
    backdrop-filter: blur(8px);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.show { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--surface);
    border: 2px solid var(--sour-dark);
    border-radius: 20px;
    padding: 48px;
    max-width: 700px;
    width: 90%;
    text-align: center;
    transform: scale(0.9);
    transition: transform 0.3s;
    position: relative;
  }
  .modal-overlay.show .modal { transform: scale(1); }

  .modal-category {
    font-size: 14px;
    font-weight: 700;
    color: var(--sour-pink);
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .modal-amount {
    font-size: 48px;
    font-weight: 800;
    color: var(--gold);
    margin-bottom: 24px;
  }
  .modal-question {
    font-size: 24px;
    font-weight: 600;
    line-height: 1.5;
    margin-bottom: 32px;
    color: var(--text);
  }
  .modal-answer {
    font-size: 20px;
    font-weight: 700;
    color: var(--sour-lavender);
    padding: 16px 24px;
    background: rgba(180,160,214,0.1);
    border-radius: 12px;
    border: 1px solid rgba(180,160,214,0.2);
    margin-bottom: 24px;
    display: none;
  }
  .modal-answer.show { display: block; }

  .modal-actions {
    display: flex;
    gap: 12px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .modal-btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s;
  }
  .btn-reveal {
    background: linear-gradient(135deg, var(--sour-purple), var(--sour-pink));
    color: #fff;
  }
  .btn-reveal:hover { transform: scale(1.05); box-shadow: 0 4px 16px rgba(180,160,214,0.4); }
  .btn-close {
    background: var(--overlay);
    color: var(--text-muted);
    border: 1px solid var(--sour-dark);
  }
  .btn-close:hover { color: var(--text); border-color: var(--sour-purple); }

  .btn-award {
    background: var(--overlay);
    color: var(--gold);
    border: 1px solid rgba(255,215,0,0.3);
    font-size: 13px;
    padding: 8px 16px;
  }
  .btn-award:hover { background: rgba(255,215,0,0.1); }

  /* ── Confetti ── */
  @keyframes fall {
    0% { transform: translateY(-100vh) rotate(0deg); opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
  .confetti {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    z-index: 200;
    animation: fall 3s ease-in forwards;
    pointer-events: none;
  }

  /* ── Responsive ── */
  @media (max-width: 768px) {
    .game-header h1 { font-size: 32px; }
    .board { gap: 4px; }
    .cell { font-size: 20px; min-height: 60px; padding: 12px; }
    .category-header { font-size: 11px; padding: 10px 4px; min-height: 56px; }
    .scoreboard { gap: 10px; }
    .team-score { min-width: 140px; padding: 12px 16px; }
    .modal { padding: 32px 24px; }
    .modal-question { font-size: 20px; }
  }
</style>
</head>
<body>

<div class="app">
  <div class="game-header">
    <h1>💜 Iri's Jeopardy 💜</h1>
    <div class="subtitle">✨ Bachelorette Edition ✨</div>
  </div>

  <div class="scoreboard" id="scoreboard"></div>
  <div class="board" id="board"></div>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <div class="modal-category" id="modal-category"></div>
    <div class="modal-amount" id="modal-amount"></div>
    <div class="modal-question" id="modal-question"></div>
    <div class="modal-answer" id="modal-answer"></div>
    <div class="modal-actions" id="modal-actions"></div>
  </div>
</div>

<script>
const CATEGORIES = [
  'T-wizzle or T-swizzle',
  'GUESS THE SONG',
  'AI Boiz',
  'Jinjar (진짜)',
  'Young$ Kim'
];

const VALUES = [100, 200, 300, 400, 500];

// Questions data: [category][value] = { q, a }
// Placeholder — fill in later!
const QUESTIONS = {};
CATEGORIES.forEach(cat => {
  QUESTIONS[cat] = {};
  VALUES.forEach(val => {
    QUESTIONS[cat][val] = {
      q: `$${val} question coming soon! 💜`,
      a: 'Answer TBD'
    };
  });
});

const teams = [
  { name: 'Team 1 💜', score: 0 },
  { name: 'Team 2 💗', score: 0 },
  { name: 'Team 3 ✨', score: 0 },
];

const usedCells = new Set();
let currentQ = null;

function renderScoreboard() {
  const sb = document.getElementById('scoreboard');
  sb.innerHTML = teams.map((t, i) => `
    <div class="team-score" id="team-${i}">
      <input class="team-name-input" value="${t.name}" onchange="teams[${i}].name = this.value" />
      <div class="score-value" id="score-${i}">$${t.score}</div>
      <div class="score-controls">
        <button class="score-btn sub" onclick="adjustScore(${i}, -100)">−</button>
        <button class="score-btn add" onclick="adjustScore(${i}, 100)">+</button>
      </div>
    </div>
  `).join('');
}

function adjustScore(teamIdx, amount) {
  teams[teamIdx].score += amount;
  document.getElementById(`score-${teamIdx}`).textContent = `$${teams[teamIdx].score}`;
  if (amount > 0) pulseTeam(teamIdx);
}

function pulseTeam(idx) {
  const el = document.getElementById(`team-${idx}`);
  el.classList.add('active');
  setTimeout(() => el.classList.remove('active'), 600);
}

function renderBoard() {
  const board = document.getElementById('board');
  board.innerHTML = '';

  // Category headers
  CATEGORIES.forEach(cat => {
    const h = document.createElement('div');
    h.className = 'category-header';
    h.textContent = cat;
    board.appendChild(h);
  });

  // Value cells
  VALUES.forEach(val => {
    CATEGORIES.forEach(cat => {
      const cell = document.createElement('div');
      const key = `${cat}-${val}`;
      cell.className = 'cell' + (usedCells.has(key) ? ' used' : '');
      cell.textContent = `$${val}`;
      cell.onclick = () => {
        if (!usedCells.has(key)) openQuestion(cat, val, key);
      };
      board.appendChild(cell);
    });
  });
}

function openQuestion(cat, val, key) {
  currentQ = { cat, val, key };
  const q = QUESTIONS[cat][val];
  document.getElementById('modal-category').textContent = cat;
  document.getElementById('modal-amount').textContent = `$${val}`;
  document.getElementById('modal-question').textContent = q.q;

  const ansEl = document.getElementById('modal-answer');
  ansEl.textContent = q.a;
  ansEl.classList.remove('show');

  const actions = document.getElementById('modal-actions');
  actions.innerHTML = `
    <button class="modal-btn btn-reveal" onclick="revealAnswer()">💜 Reveal Answer</button>
    <button class="modal-btn btn-close" onclick="closeModal()">Close</button>
  `;

  document.getElementById('modal').classList.add('show');
}

function revealAnswer() {
  document.getElementById('modal-answer').classList.add('show');
  const actions = document.getElementById('modal-actions');
  actions.innerHTML = `
    ${teams.map((t, i) => `<button class="modal-btn btn-award" onclick="awardPoints(${i})">🏆 ${t.name}</button>`).join('')}
    <button class="modal-btn btn-close" onclick="closeModal()">No one got it</button>
  `;
}

function awardPoints(teamIdx) {
  teams[teamIdx].score += currentQ.val;
  document.getElementById(`score-${teamIdx}`).textContent = `$${teams[teamIdx].score}`;
  pulseTeam(teamIdx);
  launchConfetti();
  closeModal();
}

function closeModal() {
  if (currentQ) {
    usedCells.add(currentQ.key);
    renderBoard();
    currentQ = null;
  }
  document.getElementById('modal').classList.remove('show');
}

function launchConfetti() {
  const colors = ['#b4a0d6', '#e8b4cb', '#ffd700', '#c8b6e2', '#7ee8a0', '#f87171'];
  for (let i = 0; i < 40; i++) {
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random() * 100 + 'vw';
    c.style.background = colors[Math.floor(Math.random() * colors.length)];
    c.style.animationDelay = Math.random() * 0.5 + 's';
    c.style.animationDuration = (2 + Math.random() * 2) + 's';
    c.style.width = (5 + Math.random() * 8) + 'px';
    c.style.height = (5 + Math.random() * 8) + 'px';
    document.body.appendChild(c);
    setTimeout(() => c.remove(), 4000);
  }
}

// Close modal on overlay click
document.getElementById('modal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) closeModal();
});

// Keyboard: Escape closes modal
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

renderScoreboard();
renderBoard();
</script>
</body>
</html>
